name: Build & Deploy - Oracle Cloud Infrastructure

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Converter owner para lowercase
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build & Push backend
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.OWNER }}/tutorfy-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push web
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.OWNER }}/tutorfy-web:latest
          build-args: |
            VITE_API_URL=https://tutorfyapi.devederno.com.br
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push portal
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.OWNER }}/tutorfy-portal:latest
          build-args: |
            VITE_API_URL=https://tutorfyapi.devederno.com.br
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push admin
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.OWNER }}/tutorfy-admin:latest
          build-args: |
            VITE_API_URL=https://tutorfyapi.devederno.com.br
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Converter owner para lowercase
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy no servidor Oracle Cloud
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            cd /opt/tutorfy
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sed -i 's/GHCR_OWNER=.*/GHCR_OWNER=devederno/' .env
            docker compose pull
            docker compose run --rm backend npx prisma migrate deploy
            docker compose up -d --remove-orphans
            docker image prune -f
