name: CI/CD Pipeline to Railway

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build applications (CI Check)
        run: pnpm run build
        
      # Somente após garantir que o projeto 'builda' corretamente nós jogamos no Railway
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway (Backend)
        run: railway up --service ${{ secrets.RAILWAY_BACKEND_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      
      - name: Deploy to Railway (Frontend)
        run: railway up --service ${{ secrets.RAILWAY_FRONTEND_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
